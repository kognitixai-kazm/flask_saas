# ============================================
# docker-compose.production.yml
# Flask SaaS — Hetzner Production
# ============================================
# يتطلب: قاعدة بيانات PostgreSQL مُدارة خارجياً
# ============================================

services:
  # ── التطبيق ──
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: flask_saas_app
    restart: unless-stopped
    env_file: .env
    environment:
      - FLASK_ENV=production
    ports:
      - "8000:8000"
    volumes:
      - uploads_data:/app/static/uploads
      - session_data:/app/instance/flask_session
      - logs_data:/app/logs
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - app_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  # ── Redis (للجلسات و Rate Limiting) ──
  redis:
    image: redis:7-alpine
    container_name: flask_saas_redis
    restart: unless-stopped
    command: redis-server --maxmemory 128mb --maxmemory-policy allkeys-lru
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - app_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # ── Nginx Reverse Proxy + SSL ──
  nginx:
    image: nginx:alpine
    container_name: flask_saas_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - certbot_data:/etc/letsencrypt:ro
      - certbot_www:/var/www/certbot:ro
      - uploads_data:/app/static/uploads:ro
    depends_on:
      app:
        condition: service_healthy
    networks:
      - app_network

  # ── Certbot (SSL مجاني من Let's Encrypt) ──
  certbot:
    image: certbot/certbot
    container_name: flask_saas_certbot
    volumes:
      - certbot_data:/etc/letsencrypt
      - certbot_www:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"

volumes:
  redis_data:
  uploads_data:
  session_data:
  logs_data:
  certbot_data:
  certbot_www:

networks:
  app_network:
    driver: bridge
