{% extends "base.html" %}
{% block title %}إعادة تعيين كلمة المرور — إدارة المنصة{% endblock %}
{% block body %}
<div class="min-h-screen flex items-center justify-center bg-gray-900 py-12 px-4">
  <div class="bg-gray-800 rounded-2xl shadow-2xl p-8 w-full max-w-sm">
    <h1 class="text-xl font-bold text-center text-white mb-2">كلمة مرور جديدة</h1>
    <p class="text-gray-400 text-center text-sm mb-6">6 أحرف على الأقل.</p>
    <form method="POST" class="space-y-4">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
      <input type="hidden" name="token" value="{{ token }}">
      <input type="password" name="new_password" required minlength="6" autocomplete="new-password" placeholder="كلمة المرور الجديدة"
        class="w-full bg-gray-700 border border-gray-600 rounded-lg px-4 py-3 text-white text-sm placeholder-gray-400 focus:ring-2 focus:ring-blue-500">
      <input type="password" name="new_password_confirm" required minlength="6" autocomplete="new-password" placeholder="تأكيد كلمة المرور"
        class="w-full bg-gray-700 border border-gray-600 rounded-lg px-4 py-3 text-white text-sm placeholder-gray-400 focus:ring-2 focus:ring-blue-500">
      <button type="submit" class="w-full bg-blue-600 text-white py-3 rounded-lg font-bold hover:bg-blue-700 transition">حفظ</button>
    </form>
    <p class="text-center text-sm mt-6">
      <a href="{{ url_for('super_admin.login') }}" class="text-blue-400 hover:underline">تسجيل الدخول</a>
    </p>
  </div>
</div>
{% endblock %}
