{% extends "base.html" %}
{% block body_class %}bg-[#f5f7fb]{% endblock %}
{% block body %}
<div class="flex min-h-screen flex-col md:flex-row">
    {% include "super_admin/_admin_sidebar.html" %}
    <main class="flex-1 w-full overflow-x-hidden p-4 md:p-8 pt-20 md:pt-8">
        <!-- شريط الإشعارات العلوي -->
        <div class="max-w-7xl mx-auto w-full mb-2 flex justify-end">
            <div class="relative" id="notif-bell">
                <button type="button" onclick="toggleNotifPanel()"
                        class="relative p-2 rounded-xl text-gray-500 hover:text-blue-700 hover:bg-blue-50 transition-all">
                    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/>
                    </svg>
                    <span class="notif-badge absolute -top-1 -right-1 bg-red-500 text-white text-[10px] font-bold rounded-full w-5 h-5 flex items-center justify-center shadow-sm {{ 'hidden' if not notification_count }}">
                        {{ notification_count if notification_count else '' }}
                    </span>
                </button>
                <!-- Notification Panel Dropdown -->
                <div id="notif-panel" class="hidden absolute left-0 md:right-0 md:left-auto top-full mt-2 w-80 max-w-[calc(100vw-2rem)] bg-white rounded-2xl shadow-2xl border border-gray-100 z-50 overflow-hidden">
                    <div class="flex items-center justify-between px-4 py-3 border-b border-gray-100 bg-gradient-to-l from-blue-50/40 to-white">
                        <span class="font-bold text-gray-900 text-sm">🔔 الإشعارات</span>
                        <button onclick="markAllNotifsRead()" class="text-[10px] text-blue-600 font-bold hover:underline">قراءة الكل</button>
                    </div>
                    <div id="notif-list" class="max-h-80 overflow-y-auto">
                        <div class="p-6 text-center text-gray-400 text-sm">لا توجد إشعارات</div>
                    </div>
                </div>
            </div>
        </div>
        <div class="max-w-7xl mx-auto w-full">
            {% block panel_content %}{% endblock %}
        </div>
    </main>
</div>

<style>
    /* تحسينات التجاوب على الجوال */
    @media (max-width: 768px) {
        main {
            padding-top: 5rem;
        }
        
        /* إخفاء الـ scrollbar على الجوال للتوفير في المساحة */
        ::-webkit-scrollbar {
            width: 4px;
            height: 4px;
        }
        
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        
        ::-webkit-scrollbar-thumb {
            background: rgba(0, 0, 0, 0.1);
            border-radius: 2px;
        }
    }
    
    /* تحسينات الأداء والانتقالات */
    * {
        -webkit-tap-highlight-color: transparent;
    }
    
    button, a {
        -webkit-user-select: none;
        user-select: none;
    }
</style>
{% endblock %}
