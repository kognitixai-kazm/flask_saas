{% extends "base.html" %}
{% block title %}إدارة الموردين (SRM) — {{ tenant.business_name }}{% endblock %}
{% block body %}
<div class="min-h-screen bg-gray-50 py-8 px-4">
<div class="max-w-2xl mx-auto">
  <a href="{{ url_for('admin_integrations.list_all') }}" class="text-blue-600 text-sm mb-4 block">← رجوع</a>
  <h1 class="text-2xl font-bold mb-6">📦 إدارة الموردين (SRM) — {{ tenant.business_name }}</h1>

  <form method="POST" class="bg-white rounded-xl p-6 shadow-sm space-y-4">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
    <div><label class="block text-sm font-medium mb-1">المزوّد</label>
    <select name="provider" class="w-full border rounded-lg px-4 py-2.5 text-sm">
      <option value="custom_srm" {{ 'selected' if config and config.provider == 'custom_srm' }}>مورد مخصص</option>
    </select></div>
    <div><label class="block text-sm font-medium mb-1">API Key</label>
    <input name="api_key" value="{{ config.api_key_decrypted if config else '' }}" dir="ltr" class="w-full border rounded-lg px-4 py-2.5 text-sm font-mono"></div>
    <div><label class="block text-sm font-medium mb-1">API Secret</label>
    <input name="api_secret" value="{{ config.api_secret_decrypted if config else '' }}" dir="ltr" type="password" class="w-full border rounded-lg px-4 py-2.5 text-sm font-mono"></div>
    <div><label class="block text-sm font-medium mb-1">Webhook URL (اختياري)</label>
    <input name="webhook_url" value="{{ (config.extra_config or {}).get('webhook_url','') if config else '' }}" dir="ltr" class="w-full border rounded-lg px-4 py-2.5 text-sm"></div>
    <label class="flex items-center gap-2"><input type="checkbox" name="is_active" {{ 'checked' if config and config.is_active }}><span class="text-sm font-bold">تفعيل</span></label>
    <button type="submit" class="bg-blue-600 text-white px-6 py-2.5 rounded-lg text-sm">حفظ</button>
  </form>
</div></div>
{% endblock %}
