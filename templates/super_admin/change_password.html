{% extends "base.html" %}
{% block title %}تغيير كلمة المرور — إدارة المنصة{% endblock %}
{% block body_class %}bg-gray-900{% endblock %}
{% block body %}
<div class="flex min-h-screen">
  <aside class="w-60 bg-gray-800 text-gray-300 flex-shrink-0">
    <div class="p-6 border-b border-gray-700">
      <div class="font-bold text-white">إدارة المنصة</div>
      <div class="text-xs text-gray-500">{{ g.current_admin.username }}</div>
    </div>
    <nav class="p-4 space-y-1">
      <a href="{{ url_for('super_admin.dashboard') }}" class="block px-4 py-2 rounded-lg hover:bg-gray-700 text-sm">الرئيسية</a>
      <a href="{{ url_for('super_admin.account_change_password') }}" class="block px-4 py-2 rounded-lg bg-gray-700 text-white text-sm">تغيير كلمة المرور</a>
      <hr class="border-gray-700 my-3">
      <form method="POST" action="{{ url_for('super_admin.logout') }}">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
        <button class="block w-full text-right px-4 py-2 rounded-lg text-red-400 hover:bg-gray-700 text-sm">خروج</button>
      </form>
    </nav>
  </aside>
  <main class="flex-1 bg-gray-50 p-8">
    <div class="max-w-md mx-auto bg-white rounded-xl shadow-sm p-8">
      <h1 class="text-xl font-bold mb-6">تغيير كلمة مرور الحساب</h1>
      <form method="POST" class="space-y-4">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
        <div>
          <label class="block text-sm font-medium mb-1">كلمة المرور الحالية</label>
          <input type="password" name="current_password" required autocomplete="current-password"
            class="w-full border rounded-lg px-4 py-2.5 text-sm" dir="ltr">
        </div>
        <div>
          <label class="block text-sm font-medium mb-1">كلمة المرور الجديدة</label>
          <input type="password" name="new_password" required minlength="6" autocomplete="new-password"
            class="w-full border rounded-lg px-4 py-2.5 text-sm" dir="ltr">
        </div>
        <div>
          <label class="block text-sm font-medium mb-1">تأكيد كلمة المرور</label>
          <input type="password" name="new_password_confirm" required minlength="6" autocomplete="new-password"
            class="w-full border rounded-lg px-4 py-2.5 text-sm" dir="ltr">
        </div>
        <button type="submit" class="bg-blue-600 text-white px-6 py-2.5 rounded-lg text-sm font-bold hover:bg-blue-700">تحديث</button>
      </form>
    </div>
  </main>
</div>
{% endblock %}
