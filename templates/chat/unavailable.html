<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>

<style>
*{font-family:'Tajawal',sans-serif;margin:0;padding:0;box-sizing:border-box}

p{color:#475569;font-size:.95rem;line-height:1.7}
