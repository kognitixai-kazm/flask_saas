{% extends "tenant/_base_panel.html" %}
{% block title %}{{ 'تعديل' if service else 'إضافة' }} خدمة{% endblock %}
{% block panel_content %}
<h1 class="text-2xl font-bold mb-6">🛵 {{ 'تعديل' if service else 'إضافة' }} خدمة</h1>
<form method="POST" class="bg-white rounded-xl p-6 shadow-sm space-y-4 max-w-lg">
  <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
  <div><label class="block text-sm font-medium mb-1">نوع الخدمة *</label>
  <select name="service_type" required class="w-full border rounded-lg px-4 py-2.5 text-sm">
    {% for code,label in service_types %}<option value="{{ code }}" {{ 'selected' if service and service.service_type == code }}>{{ label }}</option>{% endfor %}
  </select></div>
  <div><label class="block text-sm font-medium mb-1">الوصف</label>
  <textarea name="description" rows="2" class="w-full border rounded-lg px-4 py-2.5 text-sm">{{ service.description if service else '' }}</textarea></div>
  <div class="grid grid-cols-2 gap-4">
    <div><label class="block text-sm font-medium mb-1">رسوم التوصيل</label>
    <input type="number" name="delivery_fee" value="{{ service.delivery_fee if service else 0 }}" step="0.01" class="w-full border rounded-lg px-4 py-2.5 text-sm"></div>
    <div><label class="block text-sm font-medium mb-1">الحد الأدنى للطلب</label>
    <input type="number" name="min_order" value="{{ service.min_order if service else 0 }}" step="0.01" class="w-full border rounded-lg px-4 py-2.5 text-sm"></div>
  </div>
  <div><label class="block text-sm font-medium mb-1">مناطق التغطية</label>
  <input name="delivery_areas" value="{{ service.delivery_areas if service else '' }}" class="w-full border rounded-lg px-4 py-2.5 text-sm" placeholder="الرياض، جدة..."></div>
  <label class="flex items-center gap-2"><input type="checkbox" name="is_active" {{ 'checked' if not service or service.is_active }}><span class="text-sm">مفعّلة</span></label>
  <div class="flex gap-3 pt-2">
    <button type="submit" class="bg-blue-600 text-white px-6 py-2.5 rounded-lg text-sm">حفظ</button>
    <a href="{{ url_for('tenant_restaurant.services') }}" class="bg-gray-100 text-gray-600 px-6 py-2.5 rounded-lg text-sm">إلغاء</a>
  </div>
</form>
{% endblock %}
