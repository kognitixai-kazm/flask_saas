{% extends "tenant/_base_panel.html" %}
{% block title %}حجز جديد{% endblock %}
{% block panel_content %}
<h1 class="text-2xl font-bold mb-6">📅 إنشاء حجز يدوي</h1>
<form method="POST" class="bg-white rounded-xl p-6 shadow-sm space-y-4 max-w-2xl">
  <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

  <h3 class="font-bold text-sm border-b pb-2">👤 بيانات العميل</h3>
  <div class="grid grid-cols-2 gap-4">
    <div><label class="block text-sm font-medium mb-1">اسم العميل *</label>
    <input name="customer_name" required class="w-full border rounded-lg px-4 py-2.5 text-sm"></div>
    <div><label class="block text-sm font-medium mb-1">رقم الجوال</label>
    <input name="customer_phone" dir="ltr" class="w-full border rounded-lg px-4 py-2.5 text-sm" placeholder="+966..."></div>
  </div>
  <div><label class="block text-sm font-medium mb-1">البريد الإلكتروني</label>
  <input type="email" name="customer_email" dir="ltr" class="w-full border rounded-lg px-4 py-2.5 text-sm"></div>

  <h3 class="font-bold text-sm border-b pb-2 pt-4">📋 تفاصيل الحجز</h3>
  <div class="grid grid-cols-2 gap-4">
    <div><label class="block text-sm font-medium mb-1">الفرع</label>
    <select name="branch_id" class="w-full border rounded-lg px-4 py-2.5 text-sm">
      <option value="">اختر...</option>
      {% for b in branches %}<option value="{{ b.id }}">{{ b.name }}</option>{% endfor %}
    </select></div>
    <div><label class="block text-sm font-medium mb-1">عدد الضيوف</label>
    <input type="number" name="guests_count" value="1" min="1" class="w-full border rounded-lg px-4 py-2.5 text-sm"></div>
  </div>

  {% if activity_code == 'hotel' %}
  <!-- حقول الفندق -->
  <div class="grid grid-cols-2 gap-4">
    <div><label class="block text-sm font-medium mb-1">تاريخ الدخول *</label>
    <input type="date" name="checkin_date" required class="w-full border rounded-lg px-4 py-2.5 text-sm"></div>
    <div><label class="block text-sm font-medium mb-1">تاريخ الخروج *</label>
    <input type="date" name="checkout_date" required class="w-full border rounded-lg px-4 py-2.5 text-sm"></div>
  </div>
  <div><label class="block text-sm font-medium mb-1">نوع الوحدة المطلوبة</label>
  <select name="requested_unit_type" class="w-full border rounded-lg px-4 py-2.5 text-sm">
    <option value="">أي نوع</option>
    <option value="room">غرفة</option>
    <option value="apartment">شقة</option>
    <option value="suite">جناح</option>
    <option value="villa">فيلا</option>
  </select></div>
  {% else %}
  <!-- حقول المطعم -->
  <div class="grid grid-cols-2 gap-4">
    <div><label class="block text-sm font-medium mb-1">تاريخ الحجز *</label>
    <input type="date" name="reservation_date" required class="w-full border rounded-lg px-4 py-2.5 text-sm"></div>
    <div><label class="block text-sm font-medium mb-1">الوقت *</label>
    <input type="time" name="reservation_time" required class="w-full border rounded-lg px-4 py-2.5 text-sm"></div>
  </div>
  {% endif %}

  <div><label class="block text-sm font-medium mb-1">المبلغ (ريال) — اختياري</label>
  <input type="number" name="total_amount" step="0.01" class="w-full border rounded-lg px-4 py-2.5 text-sm" placeholder="0.00"></div>

  <div><label class="block text-sm font-medium mb-1">ملاحظات</label>
  <textarea name="notes" rows="2" class="w-full border rounded-lg px-4 py-2.5 text-sm"></textarea></div>

  <div class="flex gap-3 pt-4">
    <button type="submit" class="bg-blue-600 text-white px-6 py-2.5 rounded-lg text-sm hover:bg-blue-700">إنشاء الحجز</button>
    <a href="{{ url_for('tenant_bookings.list_bookings') }}" class="bg-gray-100 text-gray-600 px-6 py-2.5 rounded-lg text-sm">إلغاء</a>
  </div>
</form>
{% endblock %}
