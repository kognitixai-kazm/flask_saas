{% extends "base.html" %}
{% block body %}
<div class="flex min-h-screen" id="main-layout">
    {% include "tenant/_sidebar.html" %}
    <main class="flex-1 w-full min-w-0 p-4 md:p-8 bg-gray-50 min-h-screen transition-all duration-300">
        <!-- شريط الإشعارات والتحكم العلوي -->
        <div class="relative z-40 max-w-6xl mx-auto mb-6 flex justify-between items-center bg-white p-3 rounded-2xl shadow-sm border border-gray-100/50">
            <div class="flex items-center gap-3">
                <!-- زر القائمة الجانبية الذكي -->
                <button type="button" onclick="toggleSidebar()"
                        class="p-2.5 rounded-xl text-gray-500 hover:text-blue-700 hover:bg-blue-50 transition-all focus:outline-none"
                        title="تبديل القائمة الجانبية">
                    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/>
                    </svg>
                </button>
                <span class="font-bold text-gray-800 text-sm hidden sm:inline">لوحة التحكم</span>
            </div>
            
            <div class="flex items-center gap-2">
                <div class="relative" id="notif-bell">
                    <button type="button" onclick="toggleNotifPanel()"
                            class="relative p-2.5 rounded-xl text-gray-500 hover:text-blue-700 hover:bg-blue-50 transition-all">
                        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/>
                        </svg>
                        <span class="notif-badge absolute top-1.5 right-1.5 bg-red-500 text-white text-[10px] font-bold rounded-full w-5 h-5 flex items-center justify-center shadow-sm {{ 'hidden' if not notification_count }}">
                            {{ notification_count if notification_count else '' }}
                        </span>
                    </button>
                    <!-- Notification Panel Dropdown -->
                    <div id="notif-panel" class="hidden absolute left-0 top-full mt-2 w-80 max-w-[calc(100vw-2rem)] bg-white rounded-2xl shadow-2xl border border-gray-100 z-50 overflow-hidden">
                        <div class="flex items-center justify-between px-4 py-3 border-b border-gray-100 bg-gradient-to-l from-blue-50/40 to-white">
                            <span class="font-bold text-gray-900 text-sm">🔔 الإشعارات</span>
                            <button onclick="markAllNotifsRead()" class="text-[10px] text-blue-600 font-bold hover:underline">قراءة الكل</button>
                        </div>
                        <div id="notif-list" class="max-h-80 overflow-y-auto">
                            <div class="p-6 text-center text-gray-400 text-sm">لا توجد إشعارات</div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="max-w-6xl mx-auto w-full overflow-x-auto relative z-10">
            {% block panel_content %}{% endblock %}
        </div>
    </main>
</div>

<!-- Scripts for collapsible sidebar -->
<script>
function toggleSidebar() {
    const sidebar = document.getElementById('tenant-drawer');
    const backdrop = document.getElementById('drawer-backdrop');
    const isMobile = window.innerWidth < 768;
    
    if (isMobile) {
        // على الجوال: إظهار/إخفاء كـ Drawer
        if (sidebar.classList.contains('hidden')) {
            sidebar.classList.remove('hidden');
            backdrop.classList.remove('hidden');
        } else {
            sidebar.classList.add('hidden');
            backdrop.classList.add('hidden');
        }
    } else {
        // على الديسكتوب: تصغير/إخفاء اختياري
        if (sidebar.classList.contains('md:block')) {
            sidebar.classList.remove('md:block');
            sidebar.classList.add('md:hidden');
            localStorage.setItem('sidebar_collapsed', 'true');
        } else {
            sidebar.classList.remove('md:hidden');
            sidebar.classList.add('md:block');
            localStorage.setItem('sidebar_collapsed', 'false');
        }
    }
}

// تطبيق حالة القائمة الجانبية المفضلة عند تحميل الصفحة
(function() {
    const isMobile = window.innerWidth < 768;
    if (!isMobile) {
        const collapsed = localStorage.getItem('sidebar_collapsed') === 'true';
        const sidebar = document.getElementById('tenant-drawer');
        if (collapsed && sidebar) {
            sidebar.classList.remove('md:block');
            sidebar.classList.add('md:hidden');
        }
    }
})();
</script>

<!-- Driver.js for Onboarding Tour -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/driver.js@1.0.1/dist/driver.css"/>
<script src="https://cdn.jsdelivr.net/npm/driver.js@1.0.1/dist/driver.js.iife.js"></script>
{% endblock %}
