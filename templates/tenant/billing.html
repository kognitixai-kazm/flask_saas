{% extends "tenant/_settings_wrapper.html" %}
{% block settings_content %}
<div class="bg-white rounded-xl shadow-sm p-6">
    <div class="mb-6">
        <h3 class="text-lg font-bold text-gray-800">الباقة الحالية</h3>
        <div class="mt-4 p-4 border rounded-lg flex justify-between items-center bg-gray-50">
            <div>
                <p class="font-bold text-blue-600">الباقة الأساسية</p>
                <p class="text-sm text-gray-500">مفعلة وتتجدد تلقائياً.</p>
            </div>
            <button class="bg-white border border-gray-300 text-gray-700 px-4 py-2 rounded-lg text-sm hover:bg-gray-100 transition">إلغاء الاشتراك</button>
        </div>
    </div>
    
    <div>
        <h3 class="text-lg font-bold text-gray-800 mb-4">الباقات المتاحة</h3>
        <div class="grid md:grid-cols-3 gap-4">
            {% for plan in plans %}
            <div class="border rounded-xl p-5 text-center hover:shadow-md transition">
                <h4 class="font-bold text-gray-800">{{ plan.name_ar }}</h4>
                <p class="text-2xl font-black mt-2">{{ plan.price }} <span class="text-sm font-normal text-gray-500">ر.س / شهر</span></p>
                <form method="POST" action="{{ url_for('tenant.change_plan', plan_id=plan.id) }}" class="mt-4">
                    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                    <button class="w-full bg-blue-600 text-white py-2 rounded-lg text-sm font-bold hover:bg-blue-700 transition">ترقية الباقة</button>
                </form>
            </div>
            {% endfor %}
        </div>
    </div>
</div>
{% endblock %}
