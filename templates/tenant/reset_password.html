{% extends "base.html" %}
{% block title %}إعادة تعيين كلمة المرور — {{ SITE_NAME }}{% endblock %}
{% block body %}
<div class="min-h-screen flex items-center justify-center bg-gray-50 py-12 px-4">
  <div class="bg-white rounded-2xl shadow-lg p-8 w-full max-w-sm">
    <h1 class="text-xl font-bold text-center mb-2">كلمة مرور جديدة</h1>
    <p class="text-gray-500 text-center text-sm mb-6">اختر كلمة مرور قوية (6 أحرف على الأقل).</p>
    <form method="POST" class="space-y-4">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
      <input type="hidden" name="token" value="{{ token }}">
      <div>
        <label class="block text-sm font-medium mb-1">كلمة المرور الجديدة</label>
        <input type="password" name="new_password" required minlength="6" autocomplete="new-password"
          class="w-full border border-gray-300 rounded-lg px-4 py-3 text-sm focus:ring-2 focus:ring-blue-500">
      </div>
      <div>
        <label class="block text-sm font-medium mb-1">تأكيد كلمة المرور</label>
        <input type="password" name="new_password_confirm" required minlength="6" autocomplete="new-password"
          class="w-full border border-gray-300 rounded-lg px-4 py-3 text-sm focus:ring-2 focus:ring-blue-500">
      </div>
      <button type="submit" class="w-full bg-blue-600 text-white py-3 rounded-lg font-bold hover:bg-blue-700 transition">حفظ</button>
    </form>
    <p class="text-center text-sm mt-6">
      <a href="{{ url_for('tenant.login') }}" class="text-blue-600 hover:underline">تسجيل الدخول</a>
    </p>
  </div>
</div>
{% endblock %}
