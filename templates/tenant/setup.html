{% extends "base.html" %}
{% block title %}إعداد حسابك — {{ SITE_NAME }}{% endblock %}
{% block body %}
<div class="min-h-screen flex items-center justify-center bg-gray-50 py-12 px-4">
    <div class="bg-white rounded-2xl shadow-lg p-8 w-full max-w-md">
        <div class="text-4xl text-center mb-4">🔐</div>
        <h1 class="text-2xl font-bold text-center mb-2">إعداد حسابك</h1>
        <p class="text-gray-500 text-center text-sm mb-8">مرحباً <strong>{{ tenant.owner_full_name }}</strong>، حدد بيانات الدخول لنشاطك <strong>{{ tenant.business_name }}</strong></p>

        <form method="POST" class="space-y-4">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            <input type="hidden" name="token" value="{{ token }}">

            <div>
                <label class="block text-sm font-medium mb-1">اسم المستخدم *</label>
                <input type="text" name="username" value="{{ username|default('') }}" required minlength="3" dir="ltr"
                    class="w-full border border-gray-300 rounded-lg px-4 py-3 text-sm focus:ring-2 focus:ring-blue-500">
                <p class="text-xs text-gray-400 mt-1">3 أحرف على الأقل — ستستخدمه لتسجيل الدخول</p>
            </div>
            <div>
                <label class="block text-sm font-medium mb-1">كلمة المرور *</label>
                <input type="password" name="password" required minlength="6"
                    class="w-full border border-gray-300 rounded-lg px-4 py-3 text-sm focus:ring-2 focus:ring-blue-500">
            </div>
            <div>
                <label class="block text-sm font-medium mb-1">تأكيد كلمة المرور *</label>
                <input type="password" name="password_confirm" required minlength="6"
                    class="w-full border border-gray-300 rounded-lg px-4 py-3 text-sm focus:ring-2 focus:ring-blue-500">
            </div>

            <button type="submit" class="w-full bg-blue-600 text-white py-3 rounded-lg font-bold hover:bg-blue-700 transition mt-4">
                إنشاء حسابي والدخول →
            </button>
        </form>
    </div>
</div>
{% endblock %}
