{% extends "base.html" %}
{% block title %}نسيت كلمة المرور — {{ SITE_NAME }}{% endblock %}
{% block body %}
<div class="min-h-screen flex items-center justify-center bg-gray-50 py-12 px-4">
  <div class="bg-white rounded-2xl shadow-lg p-8 w-full max-w-sm">
    <h1 class="text-xl font-bold text-center mb-2">نسيت كلمة المرور</h1>
    <p class="text-gray-500 text-center text-sm mb-6">أدخل البريد المسجّل في حساب لوحة النشاط. إن وُجد حساب سيصلك رابط آمن لمرة واحدة.</p>
    <form method="POST" class="space-y-4">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
      <div>
        <label class="block text-sm font-medium mb-1">اسم المستخدم</label>
        <input type="text" name="username" required dir="ltr" autocomplete="username"
          class="w-full border border-gray-300 rounded-lg px-4 py-3 text-sm focus:ring-2 focus:ring-blue-500 mb-3">
      </div>
      <div>
        <label class="block text-sm font-medium mb-1">البريد الإلكتروني</label>
        <input type="email" name="email" required dir="ltr" autocomplete="email"
          class="w-full border border-gray-300 rounded-lg px-4 py-3 text-sm focus:ring-2 focus:ring-blue-500">
      </div>
      <button type="submit" class="w-full bg-blue-600 text-white py-3 rounded-lg font-bold hover:bg-blue-700 transition">إرسال الرابط</button>
    </form>
    <p class="text-center text-sm mt-6">
      <a href="{{ url_for('tenant.login') }}" class="text-blue-600 hover:underline">العودة لتسجيل الدخول</a>
    </p>
  </div>
</div>
{% endblock %}
