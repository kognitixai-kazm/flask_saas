{% extends "base.html" %}
{% block title %}اطلب وصول — KOGNITIX{% endblock %}
{% block body %}
<div class="min-h-screen flex items-center justify-center gradient-soft py-12 px-4">
    <div class="bg-white rounded-3xl card-shadow p-7 md:p-9 w-full max-w-md border border-blue-100/40">

        <div class="flex justify-center mb-6">
            {% with size='lg', tagline=True %}{% include "_brand.html" %}{% endwith %}
        </div>

        <div class="flex items-center justify-center gap-2 mb-6">
            <span class="w-8 h-8 rounded-full gradient-brand text-white flex items-center justify-center text-sm font-bold">1</span>
            <span class="w-12 h-1 bg-gray-200 rounded"></span>
            <span class="w-8 h-8 rounded-full bg-gray-200 text-gray-400 flex items-center justify-center text-sm">2</span>
            <span class="w-12 h-1 bg-gray-200 rounded"></span>
            <span class="w-8 h-8 rounded-full bg-gray-200 text-gray-400 flex items-center justify-center text-sm">✓</span>
        </div>

        <h1 class="text-2xl font-extrabold text-center text-blue-900 mb-1">طلب وصول للمنصة</h1>
        <p class="text-gray-500 text-center text-sm mb-7">الخطوة 1 من 2 — بياناتك الأساسية</p>

        <form method="POST" class="space-y-4">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

            <div>
                <label class="block text-sm font-bold mb-1.5 text-gray-700">الاسم الكامل *</label>
                <input type="text" name="full_name" value="{{ full_name|default('') }}" required
                    class="w-full border border-gray-200 rounded-xl px-4 py-3 text-sm focus:ring-2 focus:ring-blue-500/20 focus:border-blue-400 bg-gray-50 focus:bg-white transition">
            </div>
            <div>
                <label class="block text-sm font-bold mb-1.5 text-gray-700">البريد الإلكتروني *</label>
                <input type="email" name="email" value="{{ email|default('') }}" required dir="ltr"
                    class="w-full border border-gray-200 rounded-xl px-4 py-3 text-sm focus:ring-2 focus:ring-blue-500/20 focus:border-blue-400 bg-gray-50 focus:bg-white transition">
            </div>
            <div>
                <label class="block text-sm font-bold mb-1.5 text-gray-700">رقم الجوال *</label>
                <input type="tel" name="phone" value="{{ phone|default('') }}" required dir="ltr" placeholder="+966..."
                    class="w-full border border-gray-200 rounded-xl px-4 py-3 text-sm focus:ring-2 focus:ring-blue-500/20 focus:border-blue-400 bg-gray-50 focus:bg-white transition">
            </div>
            <div>
                <label class="block text-sm font-bold mb-1.5 text-gray-700">اسم المنشأة / الشركة *</label>
                <input type="text" name="business_name" value="{{ business_name|default('') }}" required
                    class="w-full border border-gray-200 rounded-xl px-4 py-3 text-sm focus:ring-2 focus:ring-blue-500/20 focus:border-blue-400 bg-gray-50 focus:bg-white transition">
            </div>

            <button type="submit" class="w-full gradient-brand text-white py-3 rounded-xl font-extrabold hover:opacity-95 transition mt-2 shadow-md">
                التالي — اختيار النشاط ←
            </button>
        </form>

        <p class="text-center text-xs text-gray-500 mt-6">
            لديك حساب؟ <a href="{{ url_for('tenant.login') }}" class="text-blue-700 font-bold hover:underline">تسجيل الدخول</a>
        </p>
    </div>
</div>
{% endblock %}
